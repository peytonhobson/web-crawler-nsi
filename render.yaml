# Render Blueprint file
services:
  # Web Crawler background worker service
  - type: cron
    name: web-crawler
    plan: standard
    env: python
    buildCommand: python3 -m pip install -r requirements.txt && python3 -m pip install -e . && PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/playwright python3 -m playwright install chromium
    startCommand: python orchestrator.py
    schedule: "0 9 * * *"  # Run at 9 AM UTC every 2 days
    envVars:
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "/opt/render/project/playwright"
      # Secret environment variables - set in Render dashboard
      - key: OPENAI_API_KEY
        sync: false
      - key: START_URLS
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
      # Upstash Vector dual-write target (one shared index, namespace per
      # company). Set in the dashboard. UPSTASH_NAMESPACE defaults to
      # PINECONE_INDEX_NAME when unset.
      - key: UPSTASH_VECTOR_REST_URL
        sync: false
      - key: UPSTASH_VECTOR_REST_TOKEN
        sync: false
      - key: UPSTASH_NAMESPACE
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: EXPECTED_CHUNKS
        value: 1
    autoDeploy: false